version: 2
# Dependency cooldowns: delay PRs for freshly-published versions so
# security researchers and automated scanners have time to flag malicious
# releases before we install them. See https://cooldowns.dev/.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 14

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      typescript-minor:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 14
