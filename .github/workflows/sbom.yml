name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.7
        with:
          path: ./typescript
          format: spdx-json
          artifact-name: isorun-sdk-typescript.spdx.json
          output-file: isorun-sdk-typescript.spdx.json
      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.4.0
        with:
          files: isorun-sdk-typescript.spdx.json
