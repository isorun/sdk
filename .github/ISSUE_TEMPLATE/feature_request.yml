name: Feature request
description: Suggest a new capability or API.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      render: typescript
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
